<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sarker Smart IPTV Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* Cyberpunk Neo-Noir Premium Theme Deep Customization */
        :root {
            --bg-main: #060814;
            --bg-sidebar: #0b0e22;
            --bg-card: #121736;
            --bg-card-hover: #1a204d;
            --neon-glow: #bf55ec;    
            --neon-cyan: #00e676;  
            --text-glow: linear-gradient(45deg, #bf55ec, #00e676);
            --text-primary: #ffffff;
            --text-secondary: #9aa4cf;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; }
        
        body, html { 
            height: 100dvh; 
            background: var(--bg-main); 
            color: var(--text-primary); 
            overflow: hidden;
            /* ডাউনলোড ও টেক্সট কপি করা কঠিন করার জন্য ইউজার সিলেক্ট বন্ধ */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100vw;
        }

        .main-header {
            height: 75px;
            background: rgba(6, 8, 20, 0.9);
            backdrop-filter: blur(25px);
            border-bottom: 2px solid rgba(191, 85, 236, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
            flex-shrink: 0;
        }

        .brand-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-icon {
            width: 46px;
            height: 46px;
            background: rgba(191, 85, 236, 0.2);
            border: 1px solid var(--neon-glow);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(191, 85, 236, 0.4);
        }

        .brand-icon i {
            color: var(--neon-glow);
            font-size: 1.4rem;
        }

        .brand-title h1 {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--text-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-title span {
            font-size: 0.68rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            display: block;
        }

        .content-workspace {
            display: flex;
            flex: 1;
            min-height: 0; 
            overflow: hidden;
        }

        .player-theater-zone {
            flex: 2;
            background: #020308;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
        }

        .video-box-art {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(191, 85, 236, 0.05);
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .iptv-permanent-branding {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(6, 8, 20, 0.55);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(191, 85, 236, 0.25);
            z-index: 4;
            pointer-events: none;
            user-select: none;
            opacity: 0.85;
            box-shadow: 0 0 15px rgba(191, 85, 236, 0.15);
        }

        .iptv-brand-logo-container {
            width: 24px;
            height: 24px;
            background: rgba(191, 85, 236, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--neon-glow);
        }

        .iptv-brand-logo-container i {
            color: var(--neon-glow);
            font-size: 0.85rem;
        }

        .iptv-brand-name-text {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: var(--text-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .meta-display-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-sidebar);
            padding: 20px 30px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .meta-stream-status {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .live-pulse-ring {
            width: 10px;
            height: 10px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-cyan);
            animation: pulseGlow 1.5s infinite alternate;
        }

        #now-playing-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .custom-dropdown-style {
            appearance: none;
            background: var(--bg-card);
            color: #fff;
            border: 1px solid rgba(191, 85, 236, 0.2);
            padding: 10px 40px 10px 20px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .custom-dropdown-style:focus {
            border-color: var(--neon-glow);
            box-shadow: 0 0 10px rgba(191, 85, 236, 0.3);
        }

        .sidebar-navigation-zone {
            flex: 1.1;
            min-width: 390px;
            background: var(--bg-sidebar);
            border-left: 2px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-sticky-header {
            padding: 24px;
            background: rgba(11, 14, 34, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            flex-shrink: 0;
        }

        .search-container-box {
            position: relative;
            margin-bottom: 18px;
        }

        .search-container-box i.fa-magnifying-glass {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .audio-search-trigger {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            transition: all 0.2s;
        }

        .audio-search-trigger:hover, .audio-search-trigger.listening {
            color: var(--neon-glow);
            text-shadow: 0 0 12px var(--neon-glow);
        }

        #channel-search {
            width: 100%;
            padding: 16px 50px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 18px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        #channel-search:focus {
            border-color: var(--neon-glow);
            background: #161c42;
            box-shadow: 0 0 20px rgba(191, 85, 236, 0.15);
        }

        .category-row-scroller {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .category-row-scroller::-webkit-scrollbar { height: 4px; }

        .neo-pill-tab {
            padding: 10px 18px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s;
        }

        .neo-pill-tab.active {
            background: var(--neon-glow);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(191, 85, 236, 0.4);
        }

        .scrollable-grid-space {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .neo-cyber-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 18px;
        }

        .cyber-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .cyber-card:hover {
            transform: translateY(-6px);
            border-color: rgba(191, 85, 236, 0.4);
            background: var(--bg-card-hover);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        .cyber-card.active {
            border-color: var(--neon-cyan);
            background: linear-gradient(180deg, #121736, #060814);
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.2);
        }

        .cyber-card.active .card-title-text {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .favorite-star-action {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.15);
            z-index: 10;
            padding: 4px;
            transition: all 0.2s;
        }

        .favorite-star-action:hover {
            transform: scale(1.25);
        }

        .favorite-star-action.is-fav {
            color: var(--neon-glow);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .thumbnail-shield {
            position: relative;
            z-index: 2;
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            background: rgba(6, 8, 20, 0.5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .img-channel {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .card-title-text {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .neon-toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(18, 23, 54, 0.95);
            border-left: 4px solid var(--neon-glow);
            padding: 16px 28px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 10000;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            transform: translateY(200%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
        }

        .neon-toast.show { transform: translateY(0); }
        .neon-toast.err { border-left-color: #ff1744; }

        .system-footer {
            height: 45px;
            background: #03040a;
            border-top: 1px solid rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .loading-shimmer-mask {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6, 8, 20, 0.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; backdrop-filter: blur(10px);
            flex-direction: column; gap: 15px;
        }

        .cyber-spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(191, 85, 236, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-glow);
            border-bottom-color: var(--neon-cyan);
            animation: spin 1s linear infinite;
        }

        .app-preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 25px;
            transition: opacity 0.5s ease;
        }

        .app-preloader h2 {
            font-size: 1.6rem; letter-spacing: 2px;
            background: var(--text-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.1); opacity: 1; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(191, 85, 236, 0.4); }

        /* 📱 MOBILE RESPONSIVE OPTIMIZATIONS (COMPACT HEIGHT) */
        @media (max-width: 992px) {
            body, html { overflow: hidden; height: 100dvh; } 
            .content-workspace { flex-direction: column; overflow: hidden; }
            
            .main-header { 
                height: 48px; 
                padding: 0 15px; 
                border-bottom-width: 1px;
            }
            .brand-icon { width: 32px; height: 32px; border-radius: 8px; }
            .brand-icon i { font-size: 1rem; }
            .brand-title h1 { font-size: 1.05rem; }
            .brand-title span { font-size: 0.55rem; letter-spacing: 1.5px; }

            .player-theater-zone { flex: none; width: 100%; padding: 0; background: #000; gap: 0; }
            .video-box-art { border-radius: 0; border: none; box-shadow: none; }
            
            .meta-display-card { 
                border-radius: 0; 
                padding: 8px 15px; 
            }
            #now-playing-title { font-size: 0.9rem; }
            .live-pulse-ring { width: 8px; height: 8px; }
            .custom-dropdown-style { padding: 6px 30px 6px 12px; font-size: 0.75rem; border-radius: 8px; }

            .sidebar-navigation-zone { flex: 1; min-width: 100%; }
            
            .search-sticky-header { padding: 12px; }
            .search-container-box { margin-bottom: 10px; }
            #channel-search { padding: 10px 40px; font-size: 0.85rem; border-radius: 12px; }
            .search-container-box i.fa-magnifying-glass { left: 14px; font-size: 0.85rem; }
            .audio-search-trigger { right: 10px; font-size: 1rem; }
            
            .category-row-scroller { padding-bottom: 4px; }
            .neo-pill-tab { padding: 6px 14px; font-size: 0.75rem; border-radius: 8px; }

            .scrollable-grid-space { padding: 12px 10px; }
            .neo-cyber-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
            .cyber-card { padding: 12px 6px; border-radius: 14px; }
            .thumbnail-shield { width: 44px; height: 44px; border-radius: 10px; margin-bottom: 8px; padding: 5px; }
            .card-title-text { font-size: 0.72rem; }
            .favorite-star-action { top: 6px; right: 6px; font-size: 0.75rem; }

            .iptv-permanent-branding { padding: 4px 8px; top: 10px; left: 10px; border-radius: 8px; }
            .iptv-brand-name-text { font-size: 0.7 hydrodynamic-7rem; font-size: 0.7rem; }
            .iptv-brand-logo-container { width: 16px; height: 16px; border-radius: 4px; }
            .iptv-brand-logo-container i { font-size: 0.6rem; }
            
            .system-footer { height: 30px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="main-header">
        <div class="brand-box">
            <div class="brand-icon"><i class="fas fa-terminal"></i></div>
            <div class="brand-title">
                <h1>Sarker IPTV Core</h1>
                <span>Local Engine Mode</span>
            </div>
        </div>
    </header>

    <div class="content-workspace">
        <section class="player-theater-zone">
            <div class="video-box-art" id="video-container">
                
                <div class="iptv-permanent-branding">
                    <div class="iptv-brand-logo-container">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="iptv-brand-name-text">Sarker IPTV</div>
                </div>

                <video id="video-player" controls playsinline preload="auto" controlslist="nodownload" oncontextmenu="return false;"></video>
            </div>
            <div class="meta-display-card">
                <div class="meta-stream-status">
                    <div class="live-pulse-ring"></div>
                    <h2 id="now-playing-title">চ্যানেল নির্বাচন করুন...</h2>
                </div>
                <div>
                    <select id="quality-selector" class="custom-dropdown-style" disabled>
                        <option value="auto">Auto Resolution</option>
                    </select>
                </div>
            </div>
        </section>

        <aside class="sidebar-navigation-zone">
            <div class="search-sticky-header">
                <div class="search-container-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="channel-search" placeholder="সার্চ করুন..." autocomplete="off" enterkeyhint="search">
                    <button class="audio-search-trigger" id="voice-search-btn" title="ভয়েস সার্চ"><i class="fas fa-microphone"></i></button>
                </div>
                <div class="category-row-scroller" id="dynamic-category-tabs"></div>
            </div>

            <div class="scrollable-grid-space">
                <ul class="neo-cyber-grid" id="listbar">
                    <li style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-secondary);">
                        <i class="fas fa-circle-notch fa-spin" style="font-size:24px; margin-bottom:12px; color: var(--neon-glow);"></i><br>প্লেলিস্ট প্রসেস হচ্ছে...
                    </li>
                </ul>
            </div>
        </aside>
    </div>

    <footer class="system-footer">
        <span>&copy; 2026 | Sarker Smart Solutions v2.0 Local Engine</span>
    </footer>
</div>

<div id="custom-toast" class="neon-toast"></div>

<div id="global-loader" class="app-preloader">
    <div class="cyber-spinner"></div>
    <h2>SARKER SMART IPTV</h2>
</div>

<script>
    const LOCAL_PLAYLIST_FILE = "channels.json"; 
    
    let allChannels = [], activeCategory = "all", currentChannel = null, hls = null, searchQuery = "";
    let currentLoadRetries = 0, MAX_RETRIES = 3, retryTimeout = null;
    let searchDebounceTimeout = null, controlHideTimeout = null;

    let favoritesList = JSON.parse(localStorage.getItem('iptv_favs')) || [];
    let recentsList = JSON.parse(localStorage.getItem('iptv_recents')) || [];

    const banglaToEnglishMap = {
        "টি স্পোর্টস": "t sports", "টি স্পোট": "t sports", "টিস্পোর্টস": "t sports",
        "জি বাংলা": "zee bangla", "স্টার জলসা": "star jalsha", "জলসা": "star jalsha",
        "সনি": "sony", "স্টার স্পোর্টস": "star sports", "সময়": "somoy", "যমুনা": "jamuna",
        "দীপ্ত": "deepto", "চ্যানেল আই": "channel i", "গাজী": "gtv", "জিটিভি": "gtv"
    };

    // 🌟 SARKER SPECIAL CHANNEL (UPDATED FOR LOCAL ASSET)
    // লুপে (Continuously) চালানোর জন্য এবং গিটহাব রিলেটিভ পাথ এসাইন করা হয়েছে।
    const MY_SPECIAL_CHANNEL = {
        name: "ASIF SPECIAL VIDEO",
        url: "asif.mp4",
        category: "SARKER SPECIAL",
        logo: "asif.jpg"
    };

    const qualitySelector = document.getElementById("quality-selector");
    const listBar = document.getElementById("listbar"), titleEl = document.getElementById("now-playing-title");
    const videoPlayer = document.getElementById("video-player"), searchInput = document.getElementById("channel-search");
    const catsContainer = document.getElementById("dynamic-category-tabs"), globalLoader = document.getElementById("global-loader");
    const videoContainer = document.getElementById("video-container");

    // অতিরিক্ত ডাউনলোড প্রটেকশন (ভিডিও প্লেয়ারে রাইট ক্লিক বন্ধ)
    videoPlayer.addEventListener('contextmenu', e => e.preventDefault());

    function showToast(message, isError = false) {
        const toast = document.getElementById("custom-toast");
        toast.textContent = message;
        if(isError) toast.classList.add("err"); else toast.classList.remove("err");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    videoContainer.addEventListener("click", () => {
        videoContainer.classList.add("show-controls");
        clearTimeout(controlHideTimeout);
        controlHideTimeout = setTimeout(() => { videoContainer.classList.remove("show-controls"); }, 2000); 
    });

    function initVoiceSearch() {
        const voiceBtn = document.getElementById("voice-search-btn");
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { voiceBtn.style.display = "none"; return; }

        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-BD'; 
        recognition.interimResults = false;

        voiceBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (voiceBtn.classList.contains("listening")) { recognition.stop(); } else { recognition.start(); }
        });

        recognition.onstart = () => { voiceBtn.classList.add("listening"); showToast("🎙️ শুনছি, কিছু বলুন..."); };
        recognition.onerror = () => { voiceBtn.classList.remove("listening"); showToast("❌ ভয়েস রিড করা যায়নি!", true); };
        recognition.onend = () => { voiceBtn.classList.remove("listening"); };
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.replace(/[।?.!]/g, "").trim().toLowerCase();
            let finalSearch = text;
            for (let key in banglaToEnglishMap) { if (text.includes(key)) { finalSearch = banglaToEnglishMap[key]; break; } }
            searchInput.value = finalSearch;
            searchQuery = finalSearch;
            showToast(`🔎 ফলাফল: "${finalSearch}"`);
            filterRender();
            searchInput.blur(); 
        };
    }

    async function loadLocalJson() {
        try {
            const response = await fetch(`${LOCAL_PLAYLIST_FILE}?t=${Date.now()}`);
            if (!response.ok) throw new Error("JSON failti paoa jaini.");
            const jsonData = await response.json();
            return processJsonChannels(jsonData);
        } catch (error) {
            console.error(error);
            showToast("⚠️ channels.json failti load kora jaini! Local backup chalu hochche.", true);
            return [MY_SPECIAL_CHANNEL]; 
        }
    }

    function processJsonChannels(data) {
        let list = [];
        list.push(MY_SPECIAL_CHANNEL);

        if (Array.isArray(data)) {
            data.forEach(ch => {
                const name = ch.name || "Live TV Channel";
                if(ch.url === MY_SPECIAL_CHANNEL.url) return;
                
                list.push({
                    name: name.substring(0, 45),
                    url: ch.url || "",
                    category: ch.group || "Other Channels", 
                    logo: (ch.logo && ch.logo.startsWith('http')) ? ch.logo : `https://ui-avatars.com/api/?background=121736&color=bf55ec&rounded=true&size=70&bold=true&name=${encodeURIComponent(name.slice(0,2))}`
                });
            });
        }
        return list;
    }

    function performLoadWithRetry(url) {
        videoPlayer.pause();
        destroyHls();
        
        // ক্রমাগত প্লে ব্যাক করার জন্য লুপ (Loop) হ্যান্ডলিং
        if (url === "asif.mp4") {
            videoPlayer.loop = true;
        } else {
            videoPlayer.loop = false;
        }

        let loadingDiv = document.querySelector(".loading-shimmer-mask") || document.createElement("div");
        loadingDiv.className = "loading-shimmer-mask";
        loadingDiv.innerHTML = `<div class="cyber-spinner"></div><span style="font-size:12px; color: var(--neon-glow);">স্ট্রিমিং কানেক্ট হচ্ছে...</span>`;
        videoContainer.appendChild(loadingDiv);

        // যদি নরমাল MP4 ভিডিও ফাইল হয়
        if (url.endsWith('.mp4') || url === "asif.mp4") {
            videoPlayer.src = url;
            videoPlayer.load();
            
            const onMetaLoaded = () => {
                loadingDiv.remove();
                attemptUnmutedAutoplay();
                videoPlayer.removeEventListener('loadedmetadata', onMetaLoaded);
            };
            
            videoPlayer.addEventListener('loadedmetadata', onMetaLoaded);
            
            videoPlayer.onerror = () => {
                loadingDiv.remove();
                showToast("⚠️ ভিডিও ফাইলটি লোড করা সম্ভব হয়নি!", true);
            };
        } 
        // যদি আইপিটিভি মডিউল HLS স্ট্রিম (.m3u8) হয়
        else if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true, maxBufferLength: 12 });
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                currentLoadRetries = 0;
                loadingDiv.remove();
                attemptUnmutedAutoplay(); 
                if (hls.levels && hls.levels.length) populateQualitySelectorWithLevels(hls.levels);
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (currentLoadRetries < MAX_RETRIES) {
                        currentLoadRetries++;
                        loadingDiv.innerHTML = `<div class="cyber-spinner"></div><span style="font-size:12px;">অটো রিকানেক্ট চেষ্টা চলাইছে (${currentLoadRetries}/${MAX_RETRIES})...</span>`;
                        retryTimeout = setTimeout(() => { hls.recoverMediaError(); }, 2500);
                    } else {
                        loadingDiv.remove();
                        showToast("⚠️ স্ট্রিমটি বর্তমানে অফলাইন বা অননুমোদিত!", true);
                    }
                }
            });
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            videoPlayer.src = url;
            videoPlayer.addEventListener('loadedmetadata', () => {
                loadingDiv.remove();
                attemptUnmutedAutoplay();
            });
        }
    }

    function populateQualitySelectorWithLevels(levels) {
        if (!qualitySelector) return;
        qualitySelector.innerHTML = '<option value="auto">Auto Resolution</option>';
        if (!levels || levels.length === 0) { qualitySelector.disabled = true; return; }
        qualitySelector.disabled = false;
        const sorted = [...levels].sort((a,b) => (a.height || 0) - (b.height || 0));
        sorted.forEach(lvl => {
            let label = lvl.height ? `${lvl.height}p` : `${Math.round(lvl.bitrate/1000)} kbps`;
            const originalIdx = levels.findIndex(orig => orig === lvl);
            const option = document.createElement("option");
            option.value = originalIdx;
            option.textContent = label;
            qualitySelector.appendChild(option);
        });
    }

    function destroyHls() {
        if (hls) { try { hls.destroy(); } catch(e) {} hls = null; }
        if (retryTimeout) clearTimeout(retryTimeout);
        if (qualitySelector) qualitySelector.disabled = true;
    }

    function attemptUnmutedAutoplay() {
        videoPlayer.muted = false; 
        videoPlayer.volume = 1.0;  
        videoPlayer.play().catch(() => {
            videoPlayer.muted = true;
            videoPlayer.play().then(() => {
                showToast("🔊 অডিও চালু করতে প্লেয়ারে ক্লিক করুন!");
                const unmute = () => {
                    videoPlayer.muted = false;
                    document.removeEventListener("click", unmute);
                    document.removeEventListener("touchstart", unmute);
                };
                document.addEventListener("click", unmute);
                document.addEventListener("touchstart", unmute);
            });
        });
    }

    function buildCategoryTabs(list) {
        const cats = new Set(["all", "favorites", "recents"]);
        const catCounts = { all: list.length, favorites: favoritesList.length, recents: recentsList.length };
        
        list.forEach(ch => { 
            const catName = ch.category || "Other Channels";
            cats.add(catName); 
            catCounts[catName] = (catCounts[catName] || 0) + 1;
        });

        if(activeCategory === "favorites" && favoritesList.length === 0) activeCategory = "all";
        if(activeCategory === "recents" && recentsList.length === 0) activeCategory = "all";
        
        catsContainer.innerHTML = "";
        
        Array.from(cats).forEach(cat => {
            if((cat === "favorites" && favoritesList.length === 0) || (cat === "recents" && recentsList.length === 0)) return;
            
            const btn = document.createElement("button");
            btn.className = "neo-pill-tab";
            if (cat === activeCategory) btn.classList.add("active");
            
            let displayTitle = cat === "all" ? "সব চ্যানেল" : cat === "favorites" ? "ফেভারিট" : cat === "recents" ? "রিসেন্ট" : cat;
            btn.textContent = `${displayTitle} (${catCounts[cat] || 0})`;
            
            btn.onclick = () => {
                document.querySelectorAll(".neo-pill-tab").forEach(t=>t.classList.remove("active"));
                btn.classList.add("active");
                activeCategory = cat;
                filterRender();
                searchInput.blur(); 
            };
            catsContainer.appendChild(btn);
        });
    }

    function filterRender() {
        let pool = allChannels;
        if (activeCategory === "favorites") {
            pool = allChannels.filter(ch => favoritesList.includes(ch.url));
        } else if (activeCategory === "recents") {
            pool = recentsList;
        } else if (activeCategory !== "all") {
            pool = allChannels.filter(ch => ch.category === activeCategory);
        }
        let filtered = pool.filter(ch => searchQuery === "" || ch.name.toLowerCase().includes(searchQuery.toLowerCase()));
        renderChannels(filtered);
    }

    function renderChannels(arr) {
        listBar.innerHTML = "";
        if (!arr.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:30px; text-align:center; color:var(--text-secondary);">কোনো মিল পাওয়া যায়নি!</div>`; 
            return; 
        }
        arr.forEach(ch => {
            const isFav = favoritesList.includes(ch.url);
            const li = document.createElement("li");
            li.className = "cyber-card";
            if (currentChannel && currentChannel.url === ch.url) li.classList.add("active");
            
            li.innerHTML = `
                <i class="fa-solid fa-star favorite-star-action ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite('${ch.url}', event)"></i>
                <div class="thumbnail-shield">
                    <img src="${ch.logo}" class="img-channel" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?background=121736&color=00e676&rounded=true&text=${encodeURIComponent(ch.name.slice(0,2))}'">
                </div>
                <div class="card-title-text">${escapeHtml(ch.name)}</div>
            `;
            
            li.onclick = () => {
                destroyHls();
                currentChannel = ch;
                titleEl.textContent = ch.name;
                performLoadWithRetry(ch.url);
                addToRecent(ch);
                document.querySelectorAll(".cyber-card").forEach(i=>i.classList.remove("active"));
                li.classList.add("active");
                searchInput.blur(); 
                if (window.innerWidth < 992) { document.querySelector(".main-header")?.scrollIntoView({ behavior: "smooth" }); }
            };
            listBar.appendChild(li);
        });
    }

    function toggleFavorite(chUrl, event) {
        event.stopPropagation(); 
        const idx = favoritesList.indexOf(chUrl);
        if (idx > -1) { favoritesList.splice(idx, 1); showToast("💔 ফেভারিট থেকে রিমুভ করা হয়েছে"); } 
        else { favoritesList.push(chUrl); showToast("⭐ ফেভারিটে সেভ করা হয়েছে!"); }
        localStorage.setItem('iptv_favs', JSON.stringify(favoritesList));
        buildCategoryTabs(allChannels);
        filterRender();
    }

    function addToRecent(ch) {
        recentsList = recentsList.filter(item => item.url !== ch.url);
        recentsList.unshift(ch);
        if(recentsList.length > 10) recentsList.pop();
        localStorage.setItem('iptv_recents', JSON.stringify(recentsList));
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    searchInput.addEventListener("input", e => {
        clearTimeout(searchDebounceTimeout);
        searchDebounceTimeout = setTimeout(() => { searchQuery = e.target.value; filterRender(); }, 300);
    });

    searchInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            e.preventDefault();
            searchInput.blur(); 
        }
    });

    qualitySelector.onchange = () => { if (hls) hls.currentLevel = qualitySelector.value === "auto" ? -1 : parseInt(qualitySelector.value, 10); };

    document.addEventListener("keydown", (e) => {
        if (document.activeElement === searchInput) return;
        if (e.code === "Space") { e.preventDefault(); videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause(); }
    });

    async function initApp() {
        globalLoader.style.display = "flex";
        globalLoader.style.opacity = "1";
        
        const channels = await loadLocalJson();
        
        if (!channels.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:20px; color:var(--text-secondary); text-align:center;">⚠️ কোনো চ্যানেল ডেটা পাওয়া যায়নি। 'channels.json' ফাইলটি চেক করুন।</div>`; 
            globalLoader.style.display = "none"; 
            return; 
        }
        
        allChannels = channels;
        buildCategoryTabs(allChannels);
        filterRender();
        
        if (allChannels.length) {
            const first = allChannels[0];
            currentChannel = first;
            titleEl.textContent = first.name;
            performLoadWithRetry(first.url);
        }
        
        initVoiceSearch();
        globalLoader.style.opacity = "0";
        setTimeout(() => globalLoader.style.display = "none", 500);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { if (hls) hls.stopLoad(); } 
        else { if (hls) hls.startLoad(); }
    });

    initApp();
</script>
