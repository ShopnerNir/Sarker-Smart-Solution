<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sarker Smart Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* ফিউচারিস্টিক কালার প্যালেট ও ভ্যারিয়েবল */
        :root {
            --base-bg: #0b0c16;
            --surface-bg: #131526;
            --surface-card: #1c1f38;
            --accent-primary: #00f0ff;    /* নিয়ন সায়ান */
            --accent-secondary: #ff007f;  /* নিয়ন পিংক */
            --gradient-main: linear-gradient(135deg, #00f0ff, #ff007f);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            --text-main: #f3f4f6;
            --text-muted: #8ea0c3;
            --border-glow: rgba(0, 240, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; }
        
        body, html { 
            height: 100%; 
            background: var(--base-bg); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* মেইন লেআউট গ্রিড */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ------ ফিক্সড টপ হেডার ------ */
        .premium-header {
            height: 70px;
            background: rgba(11, 12, 22, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
            flex-shrink: 0;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo-glow {
            width: 42px;
            height: 42px;
            background: var(--gradient-main);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .brand-logo-glow i {
            color: var(--base-bg);
            font-size: 1.3rem;
        }

        .brand-text-group h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text-group span {
            font-size: 0.65rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: block;
            margin-top: -2px;
        }

        .social-networks a {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-left: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-networks a:hover {
            color: var(--accent-primary);
            text-shadow: 0 0 10px var(--accent-primary);
            transform: translateY(-2px);
        }

        /* ------ কোর ইন্টারফেস বডি ------ */
        .workspace {
            display: flex;
            flex: 1;
            min-height: 0; /* স্ক্রল লক ঠিক রাখার জন্য */
            overflow: hidden;
        }

        /* ফিক্সড ভিডিও প্লেয়ার এরিয়া (ডেস্কটপ ও ট্যাবলেট) */
        .fixed-player-zone {
            flex: 1.8;
            background: #06070d;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .video-wrapper-card {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 40px rgba(0, 240, 255, 0.03);
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-bg);
            padding: 16px 24px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .meta-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-secondary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-secondary);
            animation: pulseGlow 1.5s infinite alternate;
        }

        #now-playing-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
        }

        .premium-select-wrapper {
            position: relative;
        }

        .quality-selector {
            appearance: none;
            background: var(--surface-card);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 36px 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .quality-selector:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(0,240,255,0.2);
        }

        /* স্ক্রলযোগ্য কনটেন্ট এরিয়া (সার্চ ও চ্যানেল গ্রিড) */
        .scrollable-content-zone {
            flex: 1.2;
            min-width: 380px;
            background: var(--surface-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sticky-search-panel {
            padding: 24px;
            background: rgba(19, 21, 38, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        .search-field-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-field-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        #channel-search {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: var(--surface-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        #channel-search:focus {
            border-color: var(--accent-primary);
            background: #222640;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        /* ফিল্টার ট্যাবস */
        .category-scroll-deck {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .category-scroll-deck::-webkit-scrollbar { height: 3px; }

        .modern-tab {
            padding: 8px 16px;
            background: var(--surface-card);
            color: var(--text-muted);
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s;
        }

        .modern-tab.active {
            background: var(--gradient-main);
            color: var(--base-bg);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
        }

        /* পিওর স্ক্রলিং চ্যানেল এরিয়া */
        .dynamic-channel-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .smart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }

        .grid-card-item {
            background: var(--surface-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .grid-card-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient-main);
            opacity: 0;
            z-index: 1;
            transition: opacity 0.3s;
        }

        .grid-card-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .grid-card-item.active {
            border-color: var(--accent-primary);
            background: linear-gradient(180deg, #1c1f38, #111424);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .grid-card-item.active .channel-caption {
            color: var(--accent-primary);
            font-weight: 700;
        }

        .avatar-frame {
            position: relative;
            z-index: 2;
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            background: rgba(11, 12, 22, 0.6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .channel-thumbnail {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .channel-caption {
            position: relative;
            z-index: 2;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        /* ------ স্টাইলিশ ফুটার ------ */
        .minimal-footer {
            height: 40px;
            background: #07080e;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* লোডার ও ওভারলে ইফেক্ট */
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 12, 22, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; backdrop-filter: blur(8px);
            flex-direction: column; gap: 12px;
        }

        .spinner-neon {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            border-bottom-color: var(--accent-secondary);
            animation: spin 1s linear infinite;
        }

        .master-curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--base-bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
            transition: opacity 0.5s ease;
        }

        .master-curtain h2 {
            font-size: 1.5rem; letter-spacing: 1px;
            background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* স্ক্রলবার কাস্টমাইজেশন */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--base-bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-card); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.3); }

        /* অ্যানিমেশন কিফ্রেম */
        @keyframes pulseGlow { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ======================================================= */
        /* রেসপনসিভ ব্রেকপয়েন্ট: মোবাইল ও ট্যাবলেটে ফিক্সড লেআউট */
        /* ======================================================= */
        @media (max-width: 992px) {
            body, html { overflow: hidden; height: 100%; }
            .app-shell { height: 100vh; overflow: hidden; }
            .workspace { flex-direction: column; overflow: hidden; }
            
            /* হেডার ছোট করা হয়েছে */
            .premium-header { height: 60px; padding: 0 16px; }
            .brand-logo-glow { width: 34px; height: 34px; border-radius: 8px; }
            .brand-logo-glow i { font-size: 1rem; }
            .brand-text-group h1 { font-size: 1.1rem; }
            .social-networks { display: none; }

            /* ভিডিও প্লেয়ার এরিয়া একদম ফিক্সড উপরে থাকবে */
            .fixed-player-zone {
                flex: none;
                width: 100%;
                padding: 0;
                background: #000;
                gap: 0;
            }
            .video-wrapper-card { border-radius: 0; border: none; box-shadow: none; }
            .player-meta-info { border-radius: 0; border-left: none; border-right: none; padding: 12px 16px; }
            #now-playing-title { font-size: 0.95rem; }
            .quality-selector { padding: 6px 28px 6px 12px; font-size: 0.75rem; border-radius: 8px; }

            /* সার্চ বক্স এবং চ্যানেল এরিয়া স্ক্রল করবে নিচে */
            .scrollable-content-zone {
                flex: 1;
                min-width: 100%;
                overflow-y: hidden; /* ভেতরের ডিভ স্ক্রল হ্যান্ডেল করবে */
            }
            .sticky-search-panel { padding: 14px 16px; }
            #channel-search { padding: 10px 12px 10px 38px; font-size: 0.8rem; border-radius: 12px; }
            .modern-tab { padding: 6px 12px; font-size: 0.7rem; border-radius: 8px; }
            
            .dynamic-channel-container { padding: 14px 12px; }
            .smart-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
            .avatar-frame { width: 46px; height: 46px; border-radius: 10px; margin-bottom: 8px; }
            .channel-caption { font-size: 0.68rem; }
        }

        @media (max-width: 480px) {
            .smart-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
            .avatar-frame { width: 42px; height: 42px; padding: 4px; }
            .channel-caption { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="premium-header">
        <div class="brand-container">
            <div class="brand-logo-glow">
                <i class="fas fa-satellite-dish"></i>
            </div>
            <div class="brand-text-group">
                <h1>Sarker Smart Solution</h1>
                <span>Next-Gen IPTV Platform</span>
            </div>
        </div>
        <div class="social-networks">
            <a href="https://facebook.com/utsab-sarker-arup" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://t.me/sarker_utsab" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
        </div>
    </header>

    <div class="workspace">
        <section class="fixed-player-zone">
            <div class="video-wrapper-card" id="video-container">
                <video id="video-player" controls playsinline preload="auto"></video>
            </div>
            <div class="player-meta-info">
                <div class="meta-left">
                    <div class="pulse-live-dot"></div>
                    <h2 id="now-playing-title">টি স্পোর্টস লাইভ</h2>
                </div>
                <div class="premium-select-wrapper">
                    <select id="quality-selector" class="quality-selector" disabled>
                        <option value="auto">Resolution (Auto)</option>
                    </select>
                </div>
            </div>
        </section>

        <aside class="scrollable-content-zone">
            <div class="sticky-search-panel">
                <div class="search-field-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="channel-search" placeholder="পছন্দের চ্যানেল খুঁজুন..." autocomplete="off">
                </div>
                <div class="category-scroll-deck" id="dynamic-category-tabs">
                    <button class="modern-tab active" data-cat="all">📡 সকল চ্যানেল</button>
                </div>
            </div>

            <div class="dynamic-channel-container">
                <ul class="smart-grid" id="listbar">
                    <li style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-spinner fa-spin" style="font-size:20px; margin-bottom:10px;"></i><br>চ্যানেল ডেটা লোড হচ্ছে...
                    </li>
                </ul>
            </div>
        </aside>
    </div>

    <footer class="minimal-footer">
        <span>&copy; 2026 | Sarker Smart Solution Platform</span>
    </footer>
</div>

<div id="global-loader" class="master-curtain">
    <div class="spinner-neon"></div>
    <h2>Sarker Smart Solution</h2>
</div>

<script>
    const PROXY_URL = "https://tv-proxy.shahinrhss99.workers.dev";
    const getConfigUrl = () => `${PROXY_URL}?source=playlist&t=${Date.now()}`;
    
    let FIXED_PLAYLISTS = [];
    let allChannels = [], activeCategory = "all", currentChannel = null, hls = null, searchQuery = "";
    let currentLoadRetries = 0, MAX_RETRIES = 2, retryTimeout = null, globalErrorShown = false;
    
    const qualitySelector = document.getElementById("quality-selector");
    const listBar = document.getElementById("listbar"), titleEl = document.getElementById("now-playing-title");
    const videoPlayer = document.getElementById("video-player"), searchInput = document.getElementById("channel-search");
    const catsContainer = document.getElementById("dynamic-category-tabs"), globalLoader = document.getElementById("global-loader");

    // ---------- ভিডিও কোয়ালিটি কন্ট্রোল ----------
    function populateQualitySelectorWithLevels(levels) {
        if (!qualitySelector) return;
        qualitySelector.innerHTML = "";
        const autoOption = document.createElement("option");
        autoOption.value = "auto";
        autoOption.textContent = " Auto Resolution";
        qualitySelector.appendChild(autoOption);
        if (!levels || levels.length === 0) {
            qualitySelector.disabled = true;
            return;
        }
        qualitySelector.disabled = false;
        const sortedLevels = [...levels].sort((a,b) => (a.height || 0) - (b.height || 0));
        sortedLevels.forEach(lvl => {
            let label = "";
            const height = lvl.height;
            if (height) {
                if (height <= 240) label = "240p Low";
                else if (height <= 360) label = "360p Medium";
                else if (height <= 480) label = "480p Standard";
                else if (height <= 720) label = "720p HD";
                else label = "1080p Full HD";
            } else if (lvl.bitrate) {
                label = `${Math.round(lvl.bitrate/1000)} kbps`;
            } else {
                label = "Custom Quality";
            }
            const originalIdx = levels.findIndex(orig => orig === lvl);
            const option = document.createElement("option");
            option.value = originalIdx;
            option.textContent = label;
            qualitySelector.appendChild(option);
        });
        qualitySelector.value = "auto";
        if (hls) hls.currentLevel = -1;
    }

    function attachQualityEvents() {
        if (!qualitySelector) return;
        qualitySelector.onchange = () => {
            if (hls) {
                hls.currentLevel = qualitySelector.value === "auto" ? -1 : parseInt(qualitySelector.value, 10);
            }
        };
    }

    function destroyHls() {
        if (hls) { try { hls.destroy(); } catch(e) {} hls = null; }
        if (retryTimeout) clearTimeout(retryTimeout);
        if (qualitySelector) qualitySelector.disabled = true;
    }

    function scheduleRetry(url) {
        if (currentLoadRetries >= MAX_RETRIES) {
            if (!globalErrorShown) {
                globalErrorShown = true;
                alert("⚠️ স্ট্রিমটি লোড করা সম্ভব হচ্ছে না। অনুগ্রহ করে অন্য চ্যানেল চেষ্টা করুন।");
            }
            const ld = document.querySelector(".loading-overlay");
            if(ld) ld.remove();
            return;
        }
        currentLoadRetries++;
        if (retryTimeout) clearTimeout(retryTimeout);
        let ld = document.querySelector(".loading-overlay");
        if (ld) ld.innerHTML = `<div class="spinner-neon"></div><span style="margin-top:10px; font-size:12px;">পুনরায় চেষ্টা করা হচ্ছে (${currentLoadRetries}/${MAX_RETRIES})...</span>`;
        retryTimeout = setTimeout(() => { performLoadWithRetry(url); }, currentLoadRetries * 1500);
    }

    function performLoadWithRetry(url) {
        videoPlayer.pause();
        destroyHls();
        let loadingDiv = document.querySelector(".loading-overlay");
        if (!loadingDiv) {
            loadingDiv = document.createElement("div");
            loadingDiv.className = "loading-overlay";
            document.getElementById("video-container").appendChild(loadingDiv);
        }
        loadingDiv.style.display = "flex";
        loadingDiv.innerHTML = `<div class="spinner-neon"></div><span style="margin-top:10px; font-size:12px;">স্ট্রিম রেন্ডার হচ্ছে...</span>`;

        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                globalErrorShown = false; currentLoadRetries = 0;
                loadingDiv?.remove();
                videoPlayer.play().catch(e=>console.log);
                if (hls.levels && hls.levels.length) {
                    populateQualitySelectorWithLevels(hls.levels);
                }
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { scheduleRetry(url); }
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { hls.recoverMediaError(); }
                    else { scheduleRetry(url); }
                }
            });
        } else {
            loadingDiv?.remove();
            if(!globalErrorShown) alert("HLS Streaming is not supported on this native web browser.");
        }
    }

    function loadStream(url) {
        if (retryTimeout) clearTimeout(retryTimeout);
        currentLoadRetries = 0; globalErrorShown = false;
        if (qualitySelector) {
            qualitySelector.disabled = true;
            qualitySelector.innerHTML = '<option value="auto">✨ Auto Resolution</option>';
        }
        performLoadWithRetry(url);
    }

    // ---------- আইপিটিভি ডেটা প্রসেসিং ----------
    async function loadPlaylistConfig() {
        try {
            const response = await fetch(getConfigUrl());
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            FIXED_PLAYLISTS = data.sources || [];
        } catch (error) {
            console.error("❌ কনফিগ ব্যর্থ:", error);
            FIXED_PLAYLISTS = [];
        }
    }

    async function fetchM3uPlaylist(sourceKey) {
        try {
            const resp = await fetch(`${PROXY_URL}?source=${sourceKey}`);
            if (!resp.ok) return "";
            return await resp.text();
        } catch(e) { return ""; }
    }

    async function parseM3uContent(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let current = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const nameMatch = line.match(/#EXTINF:[^,]*,?(.*)$/);
                let name = nameMatch?.[1]?.trim() || "Live TV Channel";
                let logo = "";
                let cat = "Other Channels";
                const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                if (logoMatch) logo = logoMatch[1];
                const grpMatch = line.match(/group-title="([^"]*)"/i);
                if (grpMatch) cat = grpMatch[1];
                current = { name, logo, category: cat };
            }
            else if (line && !line.startsWith('#') && current) {
                channels.push({
                    name: current.name.substring(0,45),
                    url: line,
                    category: current.category || "Other Channels",
                    logo: current.logo || ""
                });
                current = null;
            }
        }
        return channels;
    }

    async function loadAllPlaylists() {
        if (!FIXED_PLAYLISTS.length) return [];
        const results = await Promise.allSettled(FIXED_PLAYLISTS.map(async (item) => {
            if (!item.sourceKey) return [];
            const content = await fetchM3uPlaylist(item.sourceKey);
            return content ? await parseM3uContent(content) : [];
        }));
        let merged = [];
        for (const r of results) if (r.status === 'fulfilled') merged.push(...r.value);
        const unique = new Map();
        for (const ch of merged) if (!unique.has(ch.url)) unique.set(ch.url, ch);
        let final = Array.from(unique.values());
        return final.map(ch => ({
            ...ch,
            logo: (ch.logo && ch.logo.startsWith('http')) ? ch.logo : `https://ui-avatars.com/api/?background=1c1f38&color=00f0ff&rounded=true&size=70&bold=true&name=${encodeURIComponent(ch.name.slice(0,2))}`
        }));
    }

    function buildCategoryTabs(list) {
        const cats = new Set(["all"]);
        const catCounts = {};
        list.forEach(ch => { 
            const catName = ch.category || "Other Channels";
            cats.add(catName); 
            catCounts[catName] = (catCounts[catName] || 0) + 1;
        });
        
        const sorted = Array.from(cats).sort((a,b)=> a==='all'? -1 : b==='all'? 1 : a.localeCompare(b));
        catsContainer.innerHTML = "";
        
        sorted.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "modern-tab";
            if (cat === activeCategory) btn.classList.add("active");
            
            btn.innerText = cat === "all" ? `📡 অল চ্যানেল (${list.length})` : `${cat} (${catCounts[cat] || 0})`;
            
            btn.onclick = () => {
                document.querySelectorAll(".modern-tab").forEach(t=>t.classList.remove("active"));
                btn.classList.add("active");
                activeCategory = cat;
                filterRender();
            };
            catsContainer.appendChild(btn);
        });
    }

    function filterRender() {
        if (!allChannels.length) return;
        let filtered = allChannels.filter(ch => {
            const matchCat = activeCategory === "all" || ch.category === activeCategory;
            const matchSearch = searchQuery === "" || ch.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCat && matchSearch;
        });
        renderChannels(filtered);
    }

    function renderChannels(arr) {
        listBar.innerHTML = "";
        if (!arr.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:30px; text-align:center; color:var(--text-muted);">কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>`; 
            return; 
        }
        arr.forEach(ch => {
            const li = document.createElement("li");
            li.className = "grid-card-item";
            if (currentChannel && currentChannel.url === ch.url) li.classList.add("active");
            
            li.innerHTML = `
                <div class="avatar-frame">
                    <img src="${ch.logo}" class="channel-thumbnail" onerror="this.src='https://ui-avatars.com/api/?background=1c1f38&color=ff007f&rounded=true&text=${encodeURIComponent(ch.name.slice(0,2))}'">
                </div>
                <div class="channel-caption">${escapeHtml(ch.name)}</div>
            `;
            
            li.onclick = () => {
                destroyHls();
                currentChannel = ch;
                titleEl.textContent = ch.name;
                loadStream(ch.url);
                document.querySelectorAll(".grid-card-item").forEach(i=>i.classList.remove("active"));
                li.classList.add("active");
                
                // মোবাইল রেসপন্সিভনেস মেকানিজম (ক্লিক করলে স্মুথ স্ক্রল হয়ে প্লেয়ার উপরে যাবে)
                if (window.innerWidth < 992) {
                    document.querySelector(".fixed-player-zone")?.scrollIntoView({ behavior: "smooth" });
                }
            };
            listBar.appendChild(li);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    searchInput.addEventListener("input", e => { searchQuery = e.target.value; filterRender(); });

    // অ্যাপ ইনিশিয়ালাইজেশন
    async function initApp() {
        globalLoader.style.display = "flex";
        await loadPlaylistConfig();
        if (!FIXED_PLAYLISTS.length) {
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:20px;">⚠️ কনফিগ ডেটা পাওয়া যায়নি।</div>`;
            globalLoader.style.display = "none";
            return;
        }
        const channels = await loadAllPlaylists();
        if (!channels.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:20px;">⚠️ প্লেলিস্ট সম্পূর্ণ খালি।</div>`; 
            globalLoader.style.display = "none"; 
            return; 
        }
        allChannels = channels;
        buildCategoryTabs(allChannels);
        filterRender();
        
        if (allChannels.length) {
            const first = allChannels[0];
            currentChannel = first;
            titleEl.textContent = first.name;
            loadStream(first.url);
        }
        attachQualityEvents();
        
        globalLoader.style.opacity = "0";
        setTimeout(() => globalLoader.style.display = "none", 500);
    }

    // ব্যাকগ্রাউন্ড ট্যাব ম্যানেজমেন্ট оптимизация
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { if (hls) hls.stopLoad(); videoPlayer.pause(); }
        else { if (hls) hls.startLoad(); if (currentChannel && videoPlayer.paused && videoPlayer.src) videoPlayer.play().catch(e=>{}); }
    });

    initApp();
</script>
