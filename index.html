<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sarker Smart Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --base-bg: #0b0c16;
            --surface-bg: #131526;
            --surface-card: #1c1f38;
            --accent-primary: #00f0ff;    
            --accent-secondary: #ff007f;  
            --gradient-main: linear-gradient(135deg, #00f0ff, #ff007f);
            --text-main: #f3f4f6;
            --text-muted: #8ea0c3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; }
        
        /* Footer issue fix: height 100dvh added */
        body, html { 
            height: 100dvh; 
            background: var(--base-bg); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* Footer issue fix: height 100dvh added */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100vw;
        }

        .premium-header {
            height: 70px;
            background: rgba(11, 12, 22, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
            flex-shrink: 0;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo-glow {
            width: 42px;
            height: 42px;
            background: var(--gradient-main);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .brand-logo-glow i {
            color: var(--base-bg);
            font-size: 1.3rem;
        }

        .brand-text-group h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text-group span {
            font-size: 0.65rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: block;
            margin-top: -2px;
        }

        .workspace {
            display: flex;
            flex: 1;
            min-height: 0; 
            overflow: hidden;
        }

        .fixed-player-zone {
            flex: 1.8;
            background: #06070d;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .video-wrapper-card {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 40px rgba(0, 240, 255, 0.03);
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-controls-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .video-wrapper-card:hover .player-controls-overlay,
        .video-wrapper-card.show-controls .player-controls-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(19, 21, 38, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: var(--accent-primary);
            color: var(--base-bg);
            box-shadow: 0 0 15px var(--accent-primary);
            transform: scale(1.05);
        }

        .player-meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-bg);
            padding: 16px 24px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .meta-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-secondary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-secondary);
            animation: pulseGlow 1.5s infinite alternate;
        }

        #now-playing-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
        }

        .premium-select-wrapper {
            position: relative;
        }

        .quality-selector {
            appearance: none;
            background: var(--surface-card);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 36px 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .scrollable-content-zone {
            flex: 1.2;
            min-width: 380px;
            background: var(--surface-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sticky-search-panel {
            padding: 24px;
            background: rgba(19, 21, 38, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        .search-field-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-field-box i.fa-magnifying-glass {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .voice-search-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            transition: all 0.2s;
        }

        .voice-search-btn:hover, .voice-search-btn.listening {
            color: var(--accent-secondary);
            text-shadow: 0 0 10px var(--accent-secondary);
        }

        .voice-search-btn.listening {
            animation: pulseGlow 1s infinite alternate;
        }

        #channel-search {
            width: 100%;
            padding: 14px 46px 14px 46px;
            background: var(--surface-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        #channel-search:focus {
            border-color: var(--accent-primary);
            background: #222640;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .category-scroll-deck {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .category-scroll-deck::-webkit-scrollbar { height: 3px; }

        .modern-tab {
            padding: 8px 16px;
            background: var(--surface-card);
            color: var(--text-muted);
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modern-tab.active {
            background: var(--gradient-main);
            color: var(--base-bg);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
        }

        .dynamic-channel-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .smart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }

        .grid-card-item {
            background: var(--surface-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .grid-card-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .grid-card-item.active {
            border-color: var(--accent-primary);
            background: linear-gradient(180deg, #1c1f38, #111424);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .grid-card-item.active .channel-caption {
            color: var(--accent-primary);
            font-weight: 700;
        }

        .fav-toggle-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.2);
            z-index: 10;
            padding: 4px;
            transition: all 0.2s;
        }

        .fav-toggle-icon:hover {
            transform: scale(1.2);
        }

        .fav-toggle-icon.is-fav {
            color: var(--accent-secondary);
            text-shadow: 0 0 8px var(--accent-secondary);
        }

        .avatar-frame {
            position: relative;
            z-index: 2;
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            background: rgba(11, 12, 22, 0.6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .channel-thumbnail {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .channel-caption {
            position: relative;
            z-index: 2;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .toast-box {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(28, 31, 56, 0.95);
            border-left: 4px solid var(--accent-primary);
            padding: 14px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10000;
            font-size: 0.88rem;
            font-weight: 600;
            color: #fff;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-box.show { transform: translateY(0); }
        .toast-box.err { border-left-color: var(--accent-secondary); }

        .minimal-footer {
            height: 40px;
            background: #07080e;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 12, 22, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; backdrop-filter: blur(8px);
            flex-direction: column; gap: 12px;
        }

        .spinner-neon {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            border-bottom-color: var(--accent-secondary);
            animation: spin 1s linear infinite;
        }

        .master-curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--base-bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
            transition: opacity 0.5s ease;
        }

        .master-curtain h2 {
            font-size: 1.5rem; letter-spacing: 1px;
            background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--base-bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-card); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.3); }

        @media (max-width: 992px) {
            body, html { overflow: hidden; height: 100dvh; } /* Footer issue fix: height 100dvh added */
            .app-shell { height: 100dvh; overflow: hidden; } /* Footer issue fix: height 100dvh added */
            .workspace { flex-direction: column; overflow: hidden; }
            .premium-header { height: 60px; padding: 0 16px; }
            .fixed-player-zone { flex: none; width: 100%; padding: 0; background: #000; gap: 0; }
            .video-wrapper-card { border-radius: 0; border: none; box-shadow: none; }
            .player-meta-info { border-radius: 0; border-left: none; border-right: none; padding: 12px 16px; }
            #now-playing-title { font-size: 0.95rem; }
            .scrollable-content-zone { flex: 1; min-width: 100%; }
            .sticky-search-panel { padding: 14px 16px; }
            .dynamic-channel-container { padding: 14px 12px; }
            .smart-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
            .avatar-frame { width: 46px; height: 46px; border-radius: 10px; }
        }
        @media (max-width: 480px) {
            .smart-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="premium-header">
        <div class="brand-container">
            <div class="brand-logo-glow"><i class="fas fa-satellite-dish"></i></div>
            <div class="brand-text-group">
                <h1>Sarker Smart Solution</h1>
                <span>Next-Gen IPTV Platform</span>
            </div>
        </div>
    </header>

    <div class="workspace">
        <section class="fixed-player-zone">
            <div class="video-wrapper-card" id="video-container">
                <video id="video-player" controls playsinline preload="auto"></video>
                
                <div class="player-controls-overlay">
                    <button class="ctrl-btn" id="pip-btn" title="Picture in Picture"><i class="fas fa-compress-alt"></i></button>
                    <button class="ctrl-btn" id="fullscreen-btn" title="Full Screen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            <div class="player-meta-info">
                <div class="meta-left">
                    <div class="pulse-live-dot"></div>
                    <h2 id="now-playing-title">Sarker Smart Solution...</h2>
                </div>
                <div class="premium-select-wrapper">
                    <select id="quality-selector" class="quality-selector" disabled>
                        <option value="auto">Resolution (Auto)</option>
                    </select>
                </div>
            </div>
        </section>

        <aside class="scrollable-content-zone">
            <div class="sticky-search-panel">
                <div class="search-field-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="channel-search" placeholder="পছন্দের চ্যানেল খুঁজুন..." autocomplete="off">
                    <button class="voice-search-btn" id="voice-search-btn" title="ভয়েস দিয়ে সার্চ করুন"><i class="fas fa-microphone"></i></button>
                </div>
                <div class="category-scroll-deck" id="dynamic-category-tabs"></div>
            </div>

            <div class="dynamic-channel-container">
                <ul class="smart-grid" id="listbar">
                    <li style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-spinner fa-spin" style="font-size:20px; margin-bottom:10px;"></i><br>চ্যানেল ডেটা লোড হচ্ছে...
                    </li>
                </ul>
            </div>
        </aside>
    </div>

    <footer class="minimal-footer">
        <span>&copy;2026 | Sarker Smart Solution Platform</span>
    </footer>
</div>

<div id="custom-toast" class="toast-box"></div>

<div id="global-loader" class="master-curtain">
    <div class="spinner-neon"></div>
    <h2>Sarker Smart Solution</h2>
</div>

<script>
    const PROXY_URL = "https://tv-proxy.shahinrhss99.workers.dev";
    const getConfigUrl = () => `${PROXY_URL}?source=playlist&t=${Date.now()}`;
    
    let FIXED_PLAYLISTS = [];
    let allChannels = [], activeCategory = "all", currentChannel = null, hls = null, searchQuery = "";
    let currentLoadRetries = 0, MAX_RETRIES = 3, retryTimeout = null;
    let searchDebounceTimeout = null;
    let controlHideTimeout = null;

    let favoritesList = JSON.parse(localStorage.getItem('iptv_favs')) || [];
    let recentsList = JSON.parse(localStorage.getItem('iptv_recents')) || [];

    const banglaToEnglishMap = {
        "টি স্পোর্টস": "t sports", "টি স্পোট": "t sports", "টিস্পোর্টস": "t sports",
        "জি বাংলা": "zee bangla", "স্টার জলসা": "star jalsha", "জলসা": "star jalsha",
        "সনি": "sony", "স্টার স্পোর্টস": "star sports", "সময়": "somoy", "যমুনা": "jamuna",
        "দীপ্ত": "deepto", "চ্যানেল আই": "channel i", "গাজী": "gtv", "জিটিভি": "gtv"
    };

    const qualitySelector = document.getElementById("quality-selector");
    const listBar = document.getElementById("listbar"), titleEl = document.getElementById("now-playing-title");
    const videoPlayer = document.getElementById("video-player"), searchInput = document.getElementById("channel-search");
    const catsContainer = document.getElementById("dynamic-category-tabs"), globalLoader = document.getElementById("global-loader");
    const videoContainer = document.getElementById("video-container");

    function showToast(message, isError = false) {
        const toast = document.getElementById("custom-toast");
        toast.textContent = message;
        if(isError) toast.classList.add("err"); else toast.classList.remove("err");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // Controls Issue Fix: 1.5 second auto hide
    videoContainer.addEventListener("click", () => {
        videoContainer.classList.add("show-controls");
        clearTimeout(controlHideTimeout);
        controlHideTimeout = setTimeout(() => {
            videoContainer.classList.remove("show-controls");
        }, 1500); 
    });

    function initVoiceSearch() {
        const voiceBtn = document.getElementById("voice-search-btn");
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            voiceBtn.style.display = "none";
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-BD'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        voiceBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (voiceBtn.classList.contains("listening")) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        recognition.onstart = () => {
            voiceBtn.classList.add("listening");
            showToast("🎙️ কিছু বলুন, শুনছি...");
        };

        recognition.onerror = () => {
            voiceBtn.classList.remove("listening");
            showToast("❌ ভয়েস বুঝতে সমস্যা হয়েছে!", true);
        };

        recognition.onend = () => {
            voiceBtn.classList.remove("listening");
        };

        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript;
            let cleanedText = speechToText.replace(/[।?.!]/g, "").trim().toLowerCase();
            
            for (let key in banglaToEnglishMap) {
                if (cleanedText.includes(key)) {
                    cleanedText = banglaToEnglishMap[key];
                    break;
                }
            }

            searchInput.value = cleanedText;
            searchQuery = cleanedText;
            showToast(`🔎 সার্চ হচ্ছে: "${cleanedText}"`);
            filterRender();
        };
    }

    function populateQualitySelectorWithLevels(levels) {
        if (!qualitySelector) return;
        qualitySelector.innerHTML = '<option value="auto">✨ Auto Resolution</option>';
        if (!levels || levels.length === 0) { qualitySelector.disabled = true; return; }
        qualitySelector.disabled = false;
        const sortedLevels = [...levels].sort((a,b) => (a.height || 0) - (b.height || 0));
        sortedLevels.forEach(lvl => {
            let label = lvl.height ? `${lvl.height}p` : `${Math.round(lvl.bitrate/1000)} kbps`;
            const originalIdx = levels.findIndex(orig => orig === lvl);
            const option = document.createElement("option");
            option.value = originalIdx;
            option.textContent = label;
            qualitySelector.appendChild(option);
        });
    }

    function destroyHls() {
        if (hls) { try { hls.destroy(); } catch(e) {} hls = null; }
        if (retryTimeout) clearTimeout(retryTimeout);
        if (qualitySelector) qualitySelector.disabled = true;
    }

    function attemptUnmutedAutoplay() {
        videoPlayer.muted = false; 
        videoPlayer.volume = 1.0;  

        videoPlayer.play().then(() => {
            console.log("Success: Unmuted playback started successfully.");
        }).catch((error) => {
            console.warn("Autoplay block protection: Browser forced mute on initial load.", error);
            videoPlayer.muted = true;
            videoPlayer.play().then(() => {
                showToast("🔊 সাউন্ড অন করতে স্ক্রিনের যেকোনো জায়গায় টাচ করুন!");
                
                const enableSoundOnInteraction = () => {
                    videoPlayer.muted = false;
                    videoPlayer.volume = 1.0;
                    document.removeEventListener("click", enableSoundOnInteraction);
                    document.removeEventListener("touchstart", enableSoundOnInteraction);
                };
                document.addEventListener("click", enableSoundOnInteraction);
                document.addEventListener("touchstart", enableSoundOnInteraction);
            });
        });
    }

    function performLoadWithRetry(url) {
        videoPlayer.pause();
        destroyHls();
        let loadingDiv = document.querySelector(".loading-overlay") || document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `<div class="spinner-neon"></div><span style="margin-top:10px; font-size:12px;">লিঙ্ক প্রসেস হচ্ছে...</span>`;
        videoContainer.appendChild(loadingDiv);

        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true, maxBufferLength: 10 });
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                currentLoadRetries = 0;
                loadingDiv.remove();
                attemptUnmutedAutoplay(); 
                if (hls.levels && hls.levels.length) populateQualitySelectorWithLevels(hls.levels);
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (currentLoadRetries < MAX_RETRIES) {
                        currentLoadRetries++;
                        loadingDiv.innerHTML = `<div class="spinner-neon"></div><span style="margin-top:10px; font-size:12px;">অটো রিকভারি হচ্ছে (${currentLoadRetries}/${MAX_RETRIES})...</span>`;
                        retryTimeout = setTimeout(() => { hls.recoverMediaError(); }, 2000);
                    } else {
                        loadingDiv.remove();
                        showToast("⚠️ চ্যানেলটি সাময়িকভাবে ডাউন আছে!", true);
                    }
                }
            });
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            videoPlayer.src = url;
            videoPlayer.addEventListener('loadedmetadata', () => {
                loadingDiv.remove();
                attemptUnmutedAutoplay();
            });
        }
    }

    document.getElementById("pip-btn").addEventListener("click", async (e) => {
        e.stopPropagation();
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else if (videoPlayer.requestPictureInPicture) {
            await videoPlayer.requestPictureInPicture();
        } else {
            showToast("❌ আপনার ব্রাউজারে PiP সাপোর্ট করে না!", true);
        }
    });

    document.getElementById("fullscreen-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        if (!document.fullscreenElement) {
            videoContainer.requestFullscreen().then(() => {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock("landscape").catch(err => console.log("Rotation lock rejected"));
                }
            }).catch(err => {
                showToast("Fullscreen Error", true);
            });
        } else {
            document.exitFullscreen();
        }
    });

    document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    });

    document.addEventListener("keydown", (e) => {
        if (document.activeElement === searchInput) return; 
        if (e.code === "Space") { e.preventDefault(); videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause(); }
        else if (e.code === "KeyF") { e.preventDefault(); document.getElementById("fullscreen-btn").click(); }
        else if (e.code === "ArrowUp") { e.preventDefault(); videoPlayer.volume = Math.min(1, videoPlayer.volume + 0.1); }
        else if (e.code === "ArrowDown") { e.preventDefault(); videoPlayer.volume = Math.max(0, videoPlayer.volume - 0.1); }
    });

    // Keyboard hide issue fix: Added listener for Enter key
    searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            searchInput.blur();
        }
    });

    function toggleFavorite(chUrl, event) {
        event.stopPropagation(); 
        const idx = favoritesList.indexOf(chUrl);
        if (idx > -1) {
            favoritesList.splice(idx, 1);
            showToast("💔 ফেভারিট থেকে বাদ দেওয়া হয়েছে");
        } else {
            favoritesList.push(chUrl);
            showToast("💖 ফেভারিটে যুক্ত করা হয়েছে!");
        }
        localStorage.setItem('iptv_favs', JSON.stringify(favoritesList));
        buildCategoryTabs(allChannels);
        filterRender();
    }

    function addToRecent(ch) {
        recentsList = recentsList.filter(item => item.url !== ch.url); 
        recentsList.unshift(ch); 
        if(recentsList.length > 8) recentsList.pop(); 
        localStorage.setItem('iptv_recents', JSON.stringify(recentsList));
    }

    async function loadPlaylistConfig() {
        try {
            const response = await fetch(getConfigUrl());
            if (!response.ok) throw new Error();
            const data = await response.json();
            FIXED_PLAYLISTS = data.sources || [];
        } catch (error) { FIXED_PLAYLISTS = []; }
    }

    async function fetchM3uPlaylist(sourceKey) {
        try {
            const resp = await fetch(`${PROXY_URL}?source=${sourceKey}`);
            return resp.ok ? await resp.text() : "";
        } catch(e) { return ""; }
    }

    async function parseM3uContent(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let current = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const nameMatch = line.match(/#EXTINF:[^,]*,?(.*)$/);
                let name = nameMatch?.[1]?.trim() || "Live TV Channel";
                let logo = "", cat = "Other Channels";
                const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                if (logoMatch) logo = logoMatch[1];
                const grpMatch = line.match(/group-title="([^"]*)"/i);
                if (grpMatch) cat = grpMatch[1];
                current = { name, logo, category: cat };
            } else if (line && !line.startsWith('#') && current) {
                channels.push({
                    name: current.name.substring(0,45),
                    url: line,
                    category: current.category || "Other Channels",
                    logo: current.logo || ""
                });
                current = null;
            }
        }
        return channels;
    }

    async function loadAllPlaylists() {
        if (!FIXED_PLAYLISTS.length) return [];
        const results = await Promise.allSettled(FIXED_PLAYLISTS.map(async (item) => {
            const content = await fetchM3uPlaylist(item.sourceKey);
            return content ? await parseM3uContent(content) : [];
        }));
        let merged = [];
        for (const r of results) if (r.status === 'fulfilled') merged.push(...r.value);
        const unique = new Map();
        for (const ch of merged) if (!unique.has(ch.url)) unique.set(ch.url, ch);
        return Array.from(unique.values()).map(ch => ({
            ...ch,
            logo: (ch.logo && ch.logo.startsWith('http')) ? ch.logo : `https://ui-avatars.com/api/?background=1c1f38&color=00f0ff&rounded=true&size=70&bold=true&name=${encodeURIComponent(ch.name.slice(0,2))}`
        }));
    }

    function buildCategoryTabs(list) {
        const cats = new Set(["all", "favorites", "recents"]);
        const catCounts = { all: list.length, favorites: favoritesList.length, recents: recentsList.length };
        
        list.forEach(ch => { 
            const catName = ch.category || "Other Channels";
            cats.add(catName); 
            catCounts[catName] = (catCounts[catName] || 0) + 1;
        });
        
        if(activeCategory === "favorites" && favoritesList.length === 0) activeCategory = "all";
        if(activeCategory === "recents" && recentsList.length === 0) activeCategory = "all";

        catsContainer.innerHTML = "";
        
        Array.from(cats).forEach(cat => {
            if((cat === "favorites" && favoritesList.length === 0) || (cat === "recents" && recentsList.length === 0)) return;
            
            const btn = document.createElement("button");
            btn.className = "modern-tab";
            if (cat === activeCategory) btn.classList.add("active");
            
            let icon = "📡";
            if(cat === "favorites") icon = "❤️";
            else if(cat === "recents") icon = "🕒";
            
            let displayTitle = cat === "all" ? "অল চ্যানেল" : cat === "favorites" ? "ফেভারিট" : cat === "recents" ? "রিসেন্ট" : cat;
            btn.innerHTML = `${icon} ${displayTitle} (${catCounts[cat] || 0})`;
            
            btn.onclick = () => {
                document.querySelectorAll(".modern-tab").forEach(t=>t.classList.remove("active"));
                btn.classList.add("active");
                activeCategory = cat;
                filterRender();
            };
            catsContainer.appendChild(btn);
        });
    }

    function filterRender() {
        let pool = allChannels;
        if (activeCategory === "favorites") {
            pool = allChannels.filter(ch => favoritesList.includes(ch.url));
        } else if (activeCategory === "recents") {
            pool = recentsList;
        } else if (activeCategory !== "all") {
            pool = allChannels.filter(ch => ch.category === activeCategory);
        }
        
        let filtered = pool.filter(ch => searchQuery === "" || ch.name.toLowerCase().includes(searchQuery.toLowerCase()));
        renderChannels(filtered);
    }

    function renderChannels(arr) {
        listBar.innerHTML = "";
        if (!arr.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:30px; text-align:center; color:var(--text-muted);">কোনো চ্যানেল পাওয়া যায়নি!</div>`; 
            return; 
        }
        arr.forEach(ch => {
            const isFav = favoritesList.includes(ch.url);
            const li = document.createElement("li");
            li.className = "grid-card-item";
            if (currentChannel && currentChannel.url === ch.url) li.classList.add("active");
            
            li.innerHTML = `
                <i class="fa-solid fa-heart fav-toggle-icon ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite('${ch.url}', event)"></i>
                <div class="avatar-frame">
                    <img src="${ch.logo}" class="channel-thumbnail" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?background=1c1f38&color=ff007f&rounded=true&text=${encodeURIComponent(ch.name.slice(0,2))}'">
                </div>
                <div class="channel-caption">${escapeHtml(ch.name)}</div>
            `;
            
            li.onclick = () => {
                destroyHls();
                currentChannel = ch;
                titleEl.textContent = ch.name;
                performLoadWithRetry(ch.url);
                addToRecent(ch);
                document.querySelectorAll(".grid-card-item").forEach(i=>i.classList.remove("active"));
                li.classList.add("active");
                
                // Scrolling issue fix: Targeted header instead of player zone
                if (window.innerWidth < 992) {
                    document.querySelector(".premium-header")?.scrollIntoView({ behavior: "smooth" });
                }
            };
            listBar.appendChild(li);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    searchInput.addEventListener("input", e => {
        clearTimeout(searchDebounceTimeout);
        searchDebounceTimeout = setTimeout(() => {
            searchQuery = e.target.value;
            filterRender();
        }, 300);
    });

    qualitySelector.onchange = () => { if (hls) hls.currentLevel = qualitySelector.value === "auto" ? -1 : parseInt(qualitySelector.value, 10); };

    async function initApp() {
        globalLoader.style.display = "flex";
        await loadPlaylistConfig();
        const channels = await loadAllPlaylists();
        if (!channels.length) { 
            listBar.innerHTML = `<div style="grid-column:1/-1; padding:20px;">⚠️ কোনো চ্যানেল ডেটা লোড করা যায়নি।</div>`; 
            globalLoader.style.display = "none"; 
            return; 
        }
        allChannels = channels;
        buildCategoryTabs(allChannels);
        filterRender();
        
        if (allChannels.length) {
            const first = allChannels[0];
            currentChannel = first;
            titleEl.textContent = first.name;
            performLoadWithRetry(first.url);
        }
        
        initVoiceSearch();
        globalLoader.style.opacity = "0";
        setTimeout(() => globalLoader.style.display = "none", 500);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { 
            if (hls) hls.stopLoad(); 
        } else { 
            if (hls) hls.startLoad(); 
            if (currentChannel && videoPlayer.src) {
                attemptUnmutedAutoplay();
            } 
        }
    });

    initApp();
</script>
</body>
</html>
